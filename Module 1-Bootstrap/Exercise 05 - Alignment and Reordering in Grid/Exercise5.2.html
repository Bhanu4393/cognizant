<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Reordering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Resize the browser to see the columns reorder</h2>
        <div class="row text-center">
            <div class="col-12 col-md-6 order-md-2 bg-primary text-white p-5">
                <h3>Column A</h3>
                <p>Top on mobile, right on desktop (order-md-2)</p>
            </div>
            <div class="col-12 col-md-6 order-md-1 bg-secondary text-white p-5">
                <h3>Column B</h3>
                <p>Bottom on mobile, left on desktop (order-md-1)</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
