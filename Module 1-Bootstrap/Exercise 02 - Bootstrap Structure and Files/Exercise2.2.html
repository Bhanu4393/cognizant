<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2.2</title>

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">
        <h2>Bootstrap JavaScript Plugin Example</h2>

        <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#message">
            Show Message
        </button>

        <div id="message" class="collapse mt-3">
            Bootstrap JavaScript is working.
        </div>
    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
